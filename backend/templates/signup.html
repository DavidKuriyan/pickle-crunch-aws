{% extends "base.html" %}
{% block title %}Create Account — Pickle&Crunch{% endblock %}

{% block head %}
<style>
  .auth-page { min-height:calc(100vh - 72px); display:flex; align-items:center; justify-content:center; padding:40px 20px; }
  .auth-card { background:white; border-radius:28px; padding:52px 48px; width:100%; max-width:460px; box-shadow:0 16px 60px rgba(44,26,14,.12); }
  .auth-card h2 { font-family:'Playfair Display',serif; font-size:2rem; font-weight:900; color:var(--earth); margin-bottom:8px; text-align:center; }
  .auth-subtitle { font-size:.9rem; color:#8A6040; text-align:center; margin-bottom:2rem; }
  .form-group { margin-bottom:18px; }
  .form-group label { display:block; font-size:.85rem; font-weight:600; color:var(--earth); margin-bottom:7px; }
  .form-group input { width:100%; padding:13px 16px; border:2px solid rgba(44,26,14,.15); border-radius:12px; font-size:.95rem; font-family:'DM Sans',sans-serif; color:var(--earth); background:var(--cream); transition:border-color .2s; outline:none; }
  .form-group input:focus { border-color:var(--rust); box-shadow:0 0 0 3px rgba(196,68,10,.1); }
  .form-group input::placeholder { color:#B89070; }
  .submit-btn { width:100%; padding:15px; background:var(--rust); color:white; border:none; border-radius:50px; font-size:1rem; font-weight:700; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all .25s; margin-top:8px; box-shadow:0 4px 18px rgba(196,68,10,.3); }
  .submit-btn:hover { background:var(--earth); transform:translateY(-2px); }
  .auth-footer { text-align:center; margin-top:24px; font-size:.9rem; color:#6B4423; }
  .auth-footer a { color:var(--rust); font-weight:600; text-decoration:none; }
  .auth-footer a:hover { text-decoration:underline; }
  .error-box { background:#FFF0ED; border:1px solid rgba(196,68,10,.3); color:var(--rust); border-radius:10px; padding:12px 16px; font-size:.88rem; margin-bottom:16px; }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h2>Create Account</h2>
    <p class="auth-subtitle">Join thousands of pickle lovers 🥒</p>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/signup">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Choose a username" required autofocus>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Phone <span style="color:#B89070;font-weight:400;">(optional)</span></label>
        <input type="tel" name="phone" placeholder="+91 98765 43210">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required minlength="6">
      </div>
      <button type="submit" class="submit-btn">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
